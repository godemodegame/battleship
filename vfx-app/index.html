<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VFX Forge — Battleship</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <aside id="panel">
        <header>
          <h1>VFX FORGE</h1>
          <p class="sub">battleship // missing vfx models</p>
        </header>

        <nav id="effects"></nav>

        <section class="block" id="transport">
          <div class="row">
            <button id="play" class="btn icon" title="Play / pause">⏸</button>
            <input id="scrub" type="range" min="0" max="1" step="0.001" value="0" />
          </div>
          <div class="row meta">
            <span id="time">0.00s</span>
            <label class="check"><input id="loop" type="checkbox" checked /> loop</label>
          </div>
        </section>

        <section class="block" id="export">
          <button id="export-current" class="btn primary">Export current .glb</button>
          <button id="export-all" class="btn">Export all 3</button>
          <p id="status" class="status"></p>
        </section>

        <footer>
          Exports match the prompt filenames. Drop them into the game's
          <code>public/models/</code>. Animation is baked as transform
          keyframes; opacity fades stay runtime-driven, as in
          <code>Effects.tsx</code>.
        </footer>
      </aside>

      <main id="stage"></main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
