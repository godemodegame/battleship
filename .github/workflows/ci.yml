name: CI

on:
  push:
  pull_request:

jobs:
  practice:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run build
      - run: npm run verify:release
      - run: npm run test:unit
      - run: npm run test:screen
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: contracts/.nvmrc
          cache: npm
          cache-dependency-path: contracts/package-lock.json

      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm run compile
      - run: npm run lint:sol
      - name: Validate committed deployment records
        shell: bash
        run: |
          shopt -s nullglob
          for record in deployments/421614/*.json; do
            npm run validate:deployment -- "$record"
          done
      - run: npm test
